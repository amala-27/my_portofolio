<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificates - Visual Flow</title>
    <style>
      :root {
        --bg: #02030a;
        --surface: #101737;
        --text: #f9f1d1;
        --accent: #ffd850;
        --subtle: #c0c0c0;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: linear-gradient(145deg, #02030a, #101737 65%, #0a0e20);
        color: var(--text);
        font-family: "Plus Jakarta Sans", "Inter", Arial, sans-serif;
        scroll-behavior: smooth;
        height: 100%;
        overflow: hidden;
      }
      .viewport {
        height: 100vh;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
      }
      section {
        min-height: 100vh;
        scroll-snap-align: start;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
        transition:
          opacity 0.8s ease,
          transform 0.8s ease;
        opacity: 0;
        transform: translateY(24px);
      }
      section.active {
        opacity: 1;
        transform: translateY(0);
      }
      .card {
        width: 100%;
        max-width: 920px;
        border: 1px solid rgba(255, 223, 80, 0.45);
        border-radius: 16px;
        background: rgba(10, 16, 38, 0.9);
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.45);
        padding: 20px;
      }
      .card h2 {
        margin: 0 0 8px;
        color: var(--accent);
      }
      .card p {
        margin: 4px 0 14px;
        color: var(--subtle);
      }
      .bolda {
        font-weight: 700;
        color: var(--accent);
      }
      .html-certificate {
        font-style: italic;
        color: #dcd2a8;
      }
      .cert-image {
        width: 100%;
        height: 440px;
        object-fit: contain;
        border-radius: 12px;
        border: 2px solid rgba(255, 223, 80, 0.8);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
      }
      .cert-image.two {
        object-fit: contain;
      }
      .nav-note {
        font-size: 0.95rem;
        margin-top: 12px;
        color: #cabf7d;
      }
      .cta-link {
        display: inline-block;
        margin-top: 16px;
        padding: 10px 16px;
        background: var(--accent);
        color: #101010;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="viewport">
      <section id="scene1" class="active">
        <div class="card">
          <h2 class="bolda">Achievement</h2
          <img src="one.jpeg" alt="Class Photo" class="cert-image" />
          <p class="nav-note">Scroll to continue to HTML Basics Certificate</p>
        </div>
      </section>
      <section id="scene2">
        <div class="card">
          <h2 class="bolda">HTML Basics Certificate</h2>
         
          <img
            src="two.jpg"
            alt="HTML Basics Certificate"
            class="cert-image two"
          />
          <p class="nav-note">Scroll to continue to C Basics Certificate</p>
        </div>
      </section>
      <section id="scene3">
        <div class="card">
          <h2 class="bolda">C Basics Certificate</h2>
          
          <img src="three.png" alt="C Basics Certificate" class="cert-image" />
          <p class="nav-note">Scroll to return to portfolio</p>
          <a class="cta-link" href="portofolio.html">Back to Portfolio</a>
        </div>
      </section>
    </div>
    <script>
      const sections = document.querySelectorAll("section");
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("active");
            } else {
              entry.target.classList.remove("active");
            }
          });
        },
        { threshold: 0.52 },
      );
      sections.forEach((section) => observer.observe(section));
    </script>
  </body>
</html>
